<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="420" fill="#ffffff"/>
  <text x="30" y="34" font-size="20" font-weight="700" fill="#0f172a">Job Lifecycle</text>
  <text x="30" y="56" font-size="12" fill="#64748b">The HTTP response returns at "queued". Everything after is asynchronous.</text>

  <!-- QUEUED -->
  <rect x="40" y="150" width="170" height="70" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="125" y="180" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">QUEUED</text>
  <text x="125" y="201" font-size="11" fill="#64748b" text-anchor="middle">persisted + enqueued</text>

  <!-- RUNNING -->
  <rect x="320" y="150" width="170" height="70" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="405" y="180" font-size="16" font-weight="700" fill="#92400e" text-anchor="middle">RUNNING</text>
  <text x="405" y="201" font-size="11" fill="#b45309" text-anchor="middle">worker: ~5s mock work</text>

  <!-- COMPLETED -->
  <rect x="640" y="70" width="200" height="70" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="740" y="100" font-size="16" font-weight="700" fill="#065f46" text-anchor="middle">COMPLETED</text>
  <text x="740" y="121" font-size="11" fill="#047857" text-anchor="middle">result stored</text>

  <!-- FAILED / DLQ -->
  <rect x="640" y="230" width="200" height="90" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="740" y="262" font-size="16" font-weight="700" fill="#991b1b" text-anchor="middle">FAILED</text>
  <text x="740" y="283" font-size="11" fill="#b91c1c" text-anchor="middle">error stored</text>
  <text x="740" y="301" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">Dead Letter Queue</text>

  <!-- QUEUED -> RUNNING -->
  <line x1="210" y1="185" x2="320" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="265" y="176" font-size="11" fill="#334155" text-anchor="middle">worker picks up</text>

  <!-- RUNNING -> COMPLETED -->
  <line x1="490" y1="170" x2="640" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="560" y="128" font-size="11" fill="#059669" text-anchor="middle">handler succeeds</text>

  <!-- RUNNING -> FAILED -->
  <line x1="490" y1="200" x2="640" y2="265" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="560" y="252" font-size="11" fill="#dc2626" text-anchor="middle">handler throws</text>

  <!-- FAILED -> QUEUED (retry, curved) -->
  <path d="M 640 305 C 360 400, 200 360, 125 222" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#a)"/>
  <text x="400" y="392" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">retry: POST /jobs/:id/retry  ’  back to QUEUED</text>
</svg>
