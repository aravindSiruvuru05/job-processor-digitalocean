<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="s" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="sd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="30" y="32" font-size="20" font-weight="700" fill="#0f172a">Request ’ Queue ’ Worker (sequence)</text>

  <!-- Lifeline headers -->
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="30"  y="52" width="130" height="40" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="95"  y="77" fill="#3730a3">Frontend</text>

    <rect x="235" y="52" width="130" height="40" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="300" y="77" fill="#065f46">API</text>

    <rect x="435" y="52" width="130" height="40" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
    <text x="500" y="77" fill="#1e293b">Postgres</text>

    <rect x="620" y="52" width="140" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="690" y="77" fill="#991b1b">Redis / BullMQ</text>

    <rect x="820" y="52" width="120" height="40" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="880" y="77" fill="#92400e">Worker</text>
  </g>

  <!-- Lifelines -->
  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4">
    <line x1="95"  y1="92" x2="95"  y2="530"/>
    <line x1="300" y1="92" x2="300" y2="530"/>
    <line x1="500" y1="92" x2="500" y2="530"/>
    <line x1="690" y1="92" x2="690" y2="530"/>
    <line x1="880" y1="92" x2="880" y2="530"/>
  </g>

  <!-- Messages -->
  <g font-size="11.5" fill="#334155" text-anchor="middle">
    <!-- 1. FE -> API -->
    <line x1="95" y1="130" x2="300" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="197" y="123">1. POST /jobs {type, value}</text>

    <!-- 2. API -> PG -->
    <line x1="300" y1="170" x2="500" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="400" y="163">2. INSERT status = queued</text>

    <!-- 3. API -> Redis -->
    <line x1="300" y1="210" x2="690" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="495" y="203">3. enqueue { jobId }</text>

    <!-- 4. API -> FE (return, dashed) -->
    <line x1="300" y1="250" x2="95" y2="250" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#sd)"/>
    <text x="197" y="243" fill="#64748b">4. 201 { id, "queued" }</text>
  </g>

  <!-- async divider -->
  <line x1="30" y1="278" x2="940" y2="278" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="2,4"/>
  <text x="30" y="296" font-size="11" font-style="italic" fill="#94a3b8"> asynchronous: processing is decoupled from the HTTP response </text>

  <g font-size="11.5" fill="#334155" text-anchor="middle">
    <!-- 5. Redis -> Worker -->
    <line x1="690" y1="330" x2="880" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="785" y="323">5. deliver job</text>

    <!-- 6. Worker -> PG running -->
    <line x1="880" y1="372" x2="500" y2="372" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="690" y="365">6. UPDATE running (guarded claim)</text>

    <!-- 7. Worker self: handle -->
    <path d="M 880 400 h 46 v 26 h -46" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="905" y="446" text-anchor="start">7. handle() ~5s mock work</text>

    <!-- 8. Worker -> PG terminal -->
    <line x1="880" y1="470" x2="500" y2="470" stroke="#475569" stroke-width="2" marker-end="url(#s)"/>
    <text x="690" y="463">8. UPDATE completed | failed (guarded)</text>

    <!-- 9. FE poll -->
    <line x1="95" y1="512" x2="300" y2="512" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#sd)"/>
    <text x="197" y="505" fill="#64748b">9. GET /jobs (poll every 2s)</text>
  </g>
</svg>
