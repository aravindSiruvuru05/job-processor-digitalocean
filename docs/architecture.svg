<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="470" fill="#ffffff"/>
  <text x="30" y="34" font-size="20" font-weight="700" fill="#0f172a">Architecture</text>
  <text x="30" y="56" font-size="12" fill="#64748b">Postgres is the source of truth for status/results; Redis / BullMQ is the queue.</text>

  <!-- Frontend -->
  <rect x="30" y="195" width="170" height="80" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="115" y="230" font-size="15" font-weight="700" fill="#3730a3" text-anchor="middle">Frontend</text>
  <text x="115" y="251" font-size="11" fill="#4f46e5" text-anchor="middle">Vite + React + RTK Query</text>

  <!-- API -->
  <rect x="290" y="195" width="170" height="80" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="375" y="224" font-size="15" font-weight="700" fill="#065f46" text-anchor="middle">API</text>
  <text x="375" y="244" font-size="11" fill="#059669" text-anchor="middle">NestJS REST</text>
  <text x="375" y="260" font-size="11" fill="#059669" text-anchor="middle">producer + reconciliation</text>

  <!-- Postgres -->
  <rect x="555" y="70" width="180" height="80" rx="12" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="645" y="105" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Postgres</text>
  <text x="645" y="126" font-size="11" fill="#475569" text-anchor="middle">source of truth (jobs)</text>

  <!-- Redis / BullMQ -->
  <rect x="555" y="320" width="180" height="80" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="645" y="355" font-size="15" font-weight="700" fill="#991b1b" text-anchor="middle">Redis / BullMQ</text>
  <text x="645" y="376" font-size="11" fill="#dc2626" text-anchor="middle">job queue</text>

  <!-- Worker -->
  <rect x="790" y="195" width="150" height="80" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="865" y="224" font-size="15" font-weight="700" fill="#92400e" text-anchor="middle">Worker</text>
  <text x="865" y="244" font-size="11" fill="#b45309" text-anchor="middle">NestJS consumer</text>
  <text x="865" y="260" font-size="11" fill="#b45309" text-anchor="middle">Strategy + Registry</text>

  <!-- Frontend <-> API -->
  <line x1="200" y1="222" x2="290" y2="222" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="245" y="214" font-size="11" fill="#334155" text-anchor="middle">POST /jobs</text>
  <line x1="290" y1="252" x2="200" y2="252" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ad)"/>
  <text x="245" y="269" font-size="11" fill="#64748b" text-anchor="middle">GET /jobs (poll 2s)</text>

  <!-- API -> Postgres -->
  <line x1="460" y1="210" x2="555" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="470" y="158" font-size="11" fill="#334155" text-anchor="start">persist queued / read</text>

  <!-- API -> Redis (enqueue) -->
  <line x1="460" y1="258" x2="555" y2="345" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="470" y="318" font-size="11" fill="#334155" text-anchor="start">enqueue { jobId }</text>

  <!-- Redis -> Worker (deliver) -->
  <line x1="735" y1="352" x2="855" y2="275" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="820" y="330" font-size="11" fill="#334155" text-anchor="middle">deliver job</text>

  <!-- Worker -> Postgres (guarded status writes) -->
  <line x1="855" y1="195" x2="735" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="815" y="150" font-size="11" fill="#334155" text-anchor="middle">update status + result</text>

  <!-- Reconciliation note -->
  <text x="30" y="440" font-size="11" font-style="italic" fill="#94a3b8">A scheduled reconciliation sweep in the API re-enqueues orphaned "queued" rows and recovers "running" zombies.</text>
</svg>
